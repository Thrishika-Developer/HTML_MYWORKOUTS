</head>
<body>
    <div>
        <!-- disabled -->
        <button>click here</button>
        <button disabled>click here</button>
    </div>

    <div>
        <!--checked -->

        <input type="checkbox" checked>

        <input type="radio"checked>

        <!-- readonly -->
        <input type="text">
        <input type="text" value="My Name is Thrishika" readonly>
     
    </div>
</body>
