<!DOCTYPE html>
<html>
    <head>
        <title>Audio page</title>
    </head>
    <body>
        <!--Audio -->
        <div>
            <audio controls>
            <source src="AbdulKalam.mp3" type="audio/mpeg">
            </audio>
        </div>
        <!-- Audio with autoplay -->
        <div>
            <audio controls autoplay muted>
            <source src="./AbdulKalam.mp3" type="audio/mpeg">
            </audio>
        </div>
        <!-- Audio with loop -->
        <div>
            <audio controls loop>
            <source src="./AbdulKalam.mp3" type="audio/mpeg">
            </audio>
        </div>
        <!-- Audio with muted-->
        <div>
            <audio controls muted>
            <source src="./AbdulKalam.mp3" type="audio/mpeg">
            </audio>
        </div>
    </body>
</html>
