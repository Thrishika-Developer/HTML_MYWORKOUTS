<!DOCTYPE html>
<html>
    <head>
        <title>idandclass</title>
    </head>
    <body>
        <!--Id and Class-->
        <div id="first" tabindex="1" >
            <p>this is my css file text</p>
        </div>
        <div class="second" tabindex="4"> 
            <p>this is another css file</p>
        </div>
        <!-- Style -->
        <div>
            <p style="color: antiquewhite; background-color: aquamarine ;" tabindex="2">this is third css file</p>
        </div>
    </body>

    <style>
        #first{
            color: bisque;
            background:green;
            
        }
        .second{
            color: beige;
            background-color: blue;
        }
    </style>

    <!--title-->
    <P tabindex="3"><span title="Indian Overseas Bank">IOB</span> is a bank</P>
    
    <!--hidden  -->
    <p>happy <span hidden>birthday</span> my dear</p>

    <!-- contenteditable -->
    <p contenteditable="">Lorem ipsum dolor sit amet.</p>
</html>
